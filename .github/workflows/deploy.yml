name: Deploy Tech Mage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_NAME: ${{ vars.SITE_NAME || 'Tech Mage' }}
      SITE_URL: ${{ vars.SITE_URL || 'https://judahtanthony.github.io' }}
      SITE_BASE_PATH: ${{ vars.SITE_BASE_PATH || '/' }}
      SITE_INCLUDE_DRAFTS: ${{ vars.SITE_INCLUDE_DRAFTS || 'false' }}
      SITE_TIME_ZONE: ${{ vars.SITE_TIME_ZONE || 'America/New_York' }}
      SITE_DEFAULT_AUTHOR: ${{ vars.SITE_DEFAULT_AUTHOR || 'judah-t-anthony' }}
      SITE_DEFAULT_SOCIAL_IMAGE: ${{ vars.SITE_DEFAULT_SOCIAL_IMAGE || '/images/social/default-og.png' }}
      CLOUDFLARE_IMAGE_RESIZE_ENABLED: ${{ vars.CLOUDFLARE_IMAGE_RESIZE_ENABLED || 'false' }}
      CLOUDFLARE_IMAGE_RESIZE_PATH: ${{ vars.CLOUDFLARE_IMAGE_RESIZE_PATH || '/cdn-cgi/image' }}
      CLOUDFLARE_IMAGE_QUALITY: ${{ vars.CLOUDFLARE_IMAGE_QUALITY || '85' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Generate search indices
        run: pnpm run search:index

      - name: Generate redirect pages
        run: pnpm run redirects:generate

      - name: Validate content
        run: pnpm run validate:content

      - name: Verify publish scheduling edge cases
        run: pnpm run test:scheduling

      - name: Build site
        run: pnpm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
