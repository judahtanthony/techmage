name: Content Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Validate frontmatter, local links, and local images
        run: pnpm run validate:content

      - name: Verify publish scheduling edge cases
        run: pnpm run test:scheduling
